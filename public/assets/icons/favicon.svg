<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <title>EkoLink</title>
    <defs>
        <linearGradient id="ek-orange" x1="0.2" y1="0" x2="0.8" y2="1">
            <stop offset="0%" stop-color="#FFC25A"/>
            <stop offset="55%" stop-color="#F89F1B"/>
            <stop offset="100%" stop-color="#D77509"/>
        </linearGradient>
        <linearGradient id="ek-blue" x1="0.2" y1="0" x2="0.8" y2="1">
            <stop offset="0%" stop-color="#5BA8FF"/>
            <stop offset="55%" stop-color="#2D8FF7"/>
            <stop offset="100%" stop-color="#1554B5"/>
        </linearGradient>
    </defs>
    <!-- Orange : moitié haute du hex pointy-top + retour intérieur vers la bille -->
    <path d="M 14 50 L 14 30 L 50 10 L 86 30 L 86 50 L 60 50"
          stroke="url(#ek-orange)" stroke-width="11"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="55" cy="50" r="7.5" fill="url(#ek-orange)"/>
    <!-- Bleu : moitié basse du hex + retour intérieur vers la bille -->
    <path d="M 86 50 L 86 70 L 50 90 L 14 70 L 14 50 L 40 50"
          stroke="url(#ek-blue)" stroke-width="11"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="45" cy="50" r="7.5" fill="url(#ek-blue)"/>
</svg>
